<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Pro Avatar Maker V2</title>
    <style>
        :root {
            --bg-dark: #0f0f13;
            --panel-bg: #1a1a24;
            --accent: #00ffcc;
            --accent-hover: #00cca3;
            --text-main: #ffffff;
            --text-muted: #888899;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            display: flex;
            background-color: var(--panel-bg);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            width: 1400px;
            max-width: 100%;
            height: 90vh;
            overflow: hidden;
            border: 1px solid #333;
        }

        /* Scrollable Controls Area */
        .controls-panel {
            flex: 1.5;
            padding: 30px;
            overflow-y: auto;
            border-right: 2px solid #2a2a35;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            align-content: start;
        }

        .controls-panel h1 {
            grid-column: 1 / -1;
            color: var(--accent);
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid #333;
            padding-bottom: 15px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            background: #22222d;
            padding: 15px;
            border-radius: 10px;
        }

        .control-group label {
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select, input[type="color"] {
            width: 100%;
            padding: 10px;
            background-color: #111;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
            outline: none;
            cursor: pointer;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: var(--accent);
        }

        /* Right Panel: Preview and Camera */
        .preview-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
            background: radial-gradient(circle at center, #2a2a35 0%, #1a1a24 100%);
            position: relative;
        }

        .canvas-container {
            position: relative;
            margin-bottom: 30px;
        }

        canvas {
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.15);
            border: 4px solid #333;
            transition: all 0.3s ease;
        }

        /* Live Camera Feed UI */
        .camera-box {
            width: 320px;
            background: #111;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px dashed #444;
            text-align: center;
        }

        video {
            width: 100%;
            border-radius: 10px;
            background: #000;
            transform: scaleX(-1); /* Mirror camera */
            display: none;
        }

        .target-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            pointer-events: none;
            display: none;
        }

        .btn {
            background-color: var(--accent);
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 900;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            margin-bottom: 15px;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background-color: var(--accent-hover);
            transform: scale(1.02);
        }

        .btn-cam {
            background-color: #ff3366;
            color: white;
        }

        .btn-cam:hover {
            background-color: #ff1a53;
        }

        .btn-secondary {
            background-color: #333;
            color: white;
        }

        /* Camera Flash Animation */
        #flash {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            border-radius: 20px;
            z-index: 10;
        }
        
        .flash-anim {
            animation: flashEffect 0.5s ease-out;
        }

        @keyframes flashEffect {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>
<body>

    <div class="container">
        <div class="controls-panel">
            <h1>Galaxy Avatar Studio</h1>
            
            <div class="control-group">
                <label>Background Color</label>
                <input type="color" id="bgColor" value="#e0e5ec">
            </div>

            <div class="control-group">
                <label>Face Shape</label>
                <select id="gender">
                    <option value="neutral">Soft / Rounded</option>
                    <option value="masc">Strong / Angled</option>
                    <option value="fem">Pointed Chin</option>
                </select>
            </div>

            <div class="control-group">
                <label>Skin Tone</label>
                <input type="color" id="skinTone" value="#ffcda0">
            </div>

            <div class="control-group">
                <label>Face Width</label>
                <input type="range" id="faceWidth" min="80" max="140" value="110">
            </div>

            <div class="control-group">
                <label>Headwear</label>
                <select id="headwear">
                    <option value="0">None</option>
                    <option value="1">Baseball Cap</option>
                    <option value="2">Winter Beanie</option>
                    <option value="3">Turban / Joora</option>
                </select>
            </div>

            <div class="control-group">
                <label>Hair Style</label>
                <select id="hairStyle">
                    <option value="0">Bald</option>
                    <option value="1">Short Crop</option>
                    <option value="2">Spiky Anime</option>
                    <option value="3">Long & Flowing</option>
                    <option value="4">Messy Bun</option>
                    <option value="5">Undercut</option>
                    <option value="6">Curly Top</option>
                </select>
            </div>

            <div class="control-group">
                <label>Hair / Headwear Color</label>
                <input type="color" id="hairColor" value="#1a1a1a">
            </div>

            <div class="control-group">
                <label>Facial Hair</label>
                <select id="facialHair">
                    <option value="0">Clean Shaven</option>
                    <option value="1">Stubble</option>
                    <option value="2">Goatee</option>
                    <option value="3">Full Beard</option>
                </select>
            </div>

            <div class="control-group">
                <label>Eyebrows</label>
                <select id="eyebrowStyle">
                    <option value="1">Neutral</option>
                    <option value="2">Angry / Focused</option>
                    <option value="3">Sad / Worried</option>
                    <option value="4">Thick & Bushy</option>
                </select>
            </div>

            <div class="control-group">
                <label>Eye Style</label>
                <select id="eyeStyle">
                    <option value="1">Standard</option>
                    <option value="2">Determined / Slit</option>
                    <option value="3">Tired / Chill</option>
                    <option value="4">Anime Sparkle</option>
                    <option value="5">Wide Awake</option>
                </select>
            </div>

            <div class="control-group">
                <label>Eye Color</label>
                <input type="color" id="eyeColor" value="#0a84ff">
            </div>

            <div class="control-group">
                <label>Glasses</label>
                <select id="glasses">
                    <option value="0">None</option>
                    <option value="1">Classic Round</option>
                    <option value="2">Cyber Visor</option>
                    <option value="3">Dark Shades</option>
                    <option value="4">Square Reading</option>
                </select>
            </div>

            <div class="control-group">
                <label>Nose Style</label>
                <select id="noseStyle">
                    <option value="1">Small Button</option>
                    <option value="2">Pointed</option>
                    <option value="3">Broad</option>
                </select>
            </div>

            <div class="control-group">
                <label>Mouth Style</label>
                <select id="mouthStyle">
                    <option value="1">Slight Smile</option>
                    <option value="2">Neutral Line</option>
                    <option value="3">Toothy Grin</option>
                    <option value="4">Surprised (O)</option>
                    <option value="5">Frown</option>
                    <option value="6">Smirk</option>
                </select>
            </div>

            <div class="control-group">
                <label>Clothing Style</label>
                <select id="clothingStyle">
                    <option value="1">Basic Crewneck</option>
                    <option value="2">V-Neck T-Shirt</option>
                    <option value="3">Business Suit</option>
                    <option value="4">Sports Jersey</option>
                </select>
            </div>

            <div class="control-group">
                <label>Clothing Primary Color</label>
                <input type="color" id="clothingColor1" value="#002244">
            </div>
            
            <div class="control-group">
                <label>Clothing Secondary (Jersey/Suit)</label>
                <input type="color" id="clothingColor2" value="#69BE28">
            </div>
        </div>

        <div class="preview-panel">
            
            <div class="camera-box">
                <button class="btn btn-secondary" id="startCamBtn">1. Enable Live Camera</button>
                <div style="position: relative;">
                    <video id="webcam" autoplay playsinline></video>
                    <div class="target-overlay" id="targetOverlay"></div>
                </div>
                <button class="btn btn-cam" id="snapBtn" style="display: none; margin-top: 15px;">2. Snap & Auto-Generate!</button>
            </div>

            <div class="canvas-container">
                <canvas id="avatarCanvas" width="450" height="450"></canvas>
                <div id="flash"></div>
            </div>
            
            <button class="btn" id="exportBtn">📥 Download High-Res Avatar</button>
        </div>
    </div>

    <script>
        // --- 1. DOM Elements ---
        const canvas = document.getElementById('avatarCanvas');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('webcam');
        const startCamBtn = document.getElementById('startCamBtn');
        const snapBtn = document.getElementById('snapBtn');
        const targetOverlay = document.getElementById('targetOverlay');
        const flash = document.getElementById('flash');
        
        const cx = canvas.width / 2;
        const cy = canvas.height / 2 - 20; // Shifted up slightly to fit body

        // --- 2. Avatar State ---
        let state = {
            bgColor: '#e0e5ec',
            gender: 'neutral',
            skinTone: '#ffcda0',
            faceWidth: 110,
            headwear: 0,
            hairStyle: 1,
            hairColor: '#1a1a1a',
            facialHair: 0,
            eyebrowStyle: 1,
            eyeStyle: 1,
            eyeColor: '#0a84ff',
            noseStyle: 1,
            mouthStyle: 1,
            glasses: 0,
            clothingStyle: 4,
            clothingColor1: '#002244',
            clothingColor2: '#69BE28'
        };

        // Attach listeners to all inputs
        const inputs = Object.keys(state);
        inputs.forEach(id => {
            const el = document.getElementById(id);
            if(el) {
                el.addEventListener('input', (e) => {
                    let val = e.target.value;
                    if(['faceWidth', 'headwear', 'hairStyle', 'facialHair', 'eyebrowStyle', 'eyeStyle', 'noseStyle', 'mouthStyle', 'glasses', 'clothingStyle'].includes(id)) {
                        val = parseInt(val);
                    }
                    state[id] = val;
                    renderAvatar();
                });
            }
        });

        // --- 3. LIVE WEBCAM LOGIC ---
        let stream = null;

        startCamBtn.addEventListener('click', async () => {
            try {
                // Request camera access
                stream = await navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240 } });
                video.srcObject = stream;
                video.style.display = 'block';
                targetOverlay.style.display = 'block';
                startCamBtn.style.display = 'none';
                snapBtn.style.display = 'block';
            } catch (err) {
                alert("Camera access denied or requires a local server (HTTPS/localhost). Error: " + err.message);
            }
        });

        snapBtn.addEventListener('click', () => {
            if (!stream) return;

            // Flash effect
            flash.classList.remove('flash-anim');
            void flash.offsetWidth; // trigger reflow
            flash.classList.add('flash-anim');

            // Draw current video frame to a hidden canvas to sample colors
            const hiddenCanvas = document.createElement('canvas');
            const hctx = hiddenCanvas.getContext('2d');
            hiddenCanvas.width = video.videoWidth;
            hiddenCanvas.height = video.videoHeight;
            hctx.drawImage(video, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
            
            // Sample center pixel for skin tone guess
            const centerX = hiddenCanvas.width / 2;
            const centerY = hiddenCanvas.height / 2;
            const pixelData = hctx.getImageData(centerX, centerY, 1, 1).data;
            const hexSkin = "#" + ((1 << 24) + (pixelData[0] << 16) + (pixelData[1] << 8) + pixelData[2]).toString(16).slice(1);
            
            // Apply skin tone
            state.skinTone = hexSkin;
            document.getElementById('skinTone').value = hexSkin;

            // Randomize features heavily for the "AI generated" feel
            state.hairStyle = Math.floor(Math.random() * 7);
            state.eyeStyle = Math.floor(Math.random() * 5) + 1;
            state.mouthStyle = Math.floor(Math.random() * 6) + 1;
            state.facialHair = Math.floor(Math.random() * 4);
            state.headwear = Math.random() > 0.7 ? Math.floor(Math.random() * 3) + 1 : 0; // 30% chance of hat
            
            // Sync UI Dropdowns
            inputs.forEach(id => {
                const el = document.getElementById(id);
                if(el) el.value = state[id];
            });

            renderAvatar();
        });


        // --- 4. MASSIVE RENDERING ENGINE ---
        function renderAvatar() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Background
            ctx.fillStyle = state.bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawBody();
            drawNeck();
            drawHeadBase();
            drawHairBack(); 
            drawFacialHairBase();
            drawEyes();
            drawEyebrows();
            drawNose();
            drawMouth();
            drawFacialHairFront();
            
            // Headwear vs Hair logic
            if (state.headwear === 0) {
                drawHairFront();
            } else {
                drawHeadwear();
            }

            drawGlasses();
        }

        function drawNeck() {
            ctx.fillStyle = shadeColor(state.skinTone, -15);
            ctx.fillRect(cx - 35, cy + 60, 70, 80);
        }

        function drawBody() {
            // Shoulders
            ctx.fillStyle = state.clothingColor1;
            ctx.beginPath();
            ctx.moveTo(cx - 150, canvas.height);
            ctx.quadraticCurveTo(cx - 120, cy + 120, cx - 40, cy + 110);
            ctx.lineTo(cx + 40, cy + 110);
            ctx.quadraticCurveTo(cx + 120, cy + 120, cx + 150, canvas.height);
            ctx.fill();

            // Clothing Styles
            if (state.clothingStyle === 2) { // V-Neck
                ctx.fillStyle = state.skinTone;
                ctx.beginPath();
                ctx.moveTo(cx - 35, cy + 110);
                ctx.lineTo(cx + 35, cy + 110);
                ctx.lineTo(cx, cy + 160);
                ctx.fill();
            } else if (state.clothingStyle === 3) { // Suit
                ctx.fillStyle = '#ffffff'; // Shirt
                ctx.beginPath();
                ctx.moveTo(cx - 30, cy + 110);
                ctx.lineTo(cx + 30, cy + 110);
                ctx.lineTo(cx, cy + 180);
                ctx.fill();
                
                ctx.fillStyle = state.clothingColor2; // Tie
                ctx.beginPath();
                ctx.moveTo(cx - 10, cy + 130);
                ctx.lineTo(cx + 10, cy + 130);
                ctx.lineTo(cx + 5, cy + 220);
                ctx.lineTo(cx, cy + 230);
                ctx.lineTo(cx - 5, cy + 220);
                ctx.fill();
                
                // Lapels
                ctx.fillStyle = shadeColor(state.clothingColor1, -20);
                ctx.beginPath(); ctx.moveTo(cx - 30, cy + 110); ctx.lineTo(cx - 70, cy + 180); ctx.lineTo(cx - 20, cy + 240); ctx.fill();
                ctx.beginPath(); ctx.moveTo(cx + 30, cy + 110); ctx.lineTo(cx + 70, cy + 180); ctx.lineTo(cx + 20, cy + 240); ctx.fill();
            } else if (state.clothingStyle === 4) { // Sports Jersey
                ctx.strokeStyle = state.clothingColor2;
                ctx.lineWidth = 15;
                ctx.beginPath();
                // Collar trim
                ctx.moveTo(cx - 35, cy + 110);
                ctx.lineTo(cx, cy + 140);
                ctx.lineTo(cx + 35, cy + 110);
                ctx.stroke();
                // Shoulder stripes
                ctx.beginPath(); ctx.moveTo(cx - 90, cy + 130); ctx.lineTo(cx - 140, cy + 180); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(cx + 90, cy + 130); ctx.lineTo(cx + 140, cy + 180); ctx.stroke();
                // Number placeholder
                ctx.fillStyle = state.clothingColor2;
                ctx.font = "bold 60px Arial";
                ctx.textAlign = "center";
                ctx.fillText("12", cx, cy + 230);
            }
        }

        function drawHeadBase() {
            ctx.fillStyle = state.skinTone;
            ctx.beginPath();
            
            let jawHeight = cy + 70;
            if (state.gender === 'masc') jawHeight = cy + 85; 
            if (state.gender === 'fem') jawHeight = cy + 60;  

            ctx.moveTo(cx, jawHeight);
            ctx.bezierCurveTo(cx + state.faceWidth, jawHeight, cx + state.faceWidth + 10, cy - 80, cx, cy - 100);
            ctx.bezierCurveTo(cx - state.faceWidth - 10, cy - 80, cx - state.faceWidth, jawHeight, cx, jawHeight);
            ctx.fill();

            // Ears
            ctx.beginPath();
            ctx.arc(cx - state.faceWidth + 10, cy, 15, 0, Math.PI*2);
            ctx.arc(cx + state.faceWidth - 10, cy, 15, 0, Math.PI*2);
            ctx.fill();
        }

        function drawEyebrows() {
            ctx.strokeStyle = shadeColor(state.hairColor, -20);
            ctx.lineCap = "round";
            const bw = 25; // brow width
            const y = cy - 40;
            const ox = 35; // offset X
            
            ctx.beginPath();
            if (state.eyebrowStyle === 1) { // Neutral
                ctx.lineWidth = 6;
                ctx.moveTo(cx - ox - bw, y); ctx.quadraticCurveTo(cx - ox, y - 10, cx - ox + bw, y);
                ctx.moveTo(cx + ox - bw, y); ctx.quadraticCurveTo(cx + ox, y - 10, cx + ox + bw, y);
            } else if (state.eyebrowStyle === 2) { // Angry
                ctx.lineWidth = 8;
                ctx.moveTo(cx - ox - bw, y - 10); ctx.lineTo(cx - ox + bw, y + 5);
                ctx.moveTo(cx + ox - bw, y + 5); ctx.lineTo(cx + ox + bw, y - 10);
            } else if (state.eyebrowStyle === 3) { // Sad
                ctx.lineWidth = 6;
                ctx.moveTo(cx - ox - bw, y + 5); ctx.lineTo(cx - ox + bw, y - 10);
                ctx.moveTo(cx + ox - bw, y - 10); ctx.lineTo(cx + ox + bw, y + 5);
            } else if (state.eyebrowStyle === 4) { // Thick
                ctx.lineWidth = 14;
                ctx.moveTo(cx - ox - bw, y); ctx.lineTo(cx - ox + bw, y);
                ctx.moveTo(cx + ox - bw, y); ctx.lineTo(cx + ox + bw, y);
            }
            ctx.stroke();
        }

        function drawEyes() {
            const ex = 40;
            const ey = cy - 10;
            
            // Whites
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            if (state.eyeStyle === 1 || state.eyeStyle === 4) { // Round
                ctx.ellipse(cx - ex, ey, 16, 22, 0, 0, Math.PI*2);
                ctx.ellipse(cx + ex, ey, 16, 22, 0, 0, Math.PI*2);
            } else if (state.eyeStyle === 2) { // Determined
                ctx.moveTo(cx - ex - 20, ey - 5); ctx.lineTo(cx - ex + 20, ey + 5); ctx.lineTo(cx - ex, ey + 15);
                ctx.moveTo(cx + ex + 20, ey - 5); ctx.lineTo(cx + ex - 20, ey + 5); ctx.lineTo(cx + ex, ey + 15);
            } else if (state.eyeStyle === 3) { // Chill
                ctx.fillRect(cx - ex - 18, ey, 36, 12);
                ctx.fillRect(cx + ex - 18, ey, 36, 12);
            } else if (state.eyeStyle === 5) { // Wide
                ctx.ellipse(cx - ex, ey, 22, 28, 0, 0, Math.PI*2);
                ctx.ellipse(cx + ex, ey, 22, 28, 0, 0, Math.PI*2);
            }
            ctx.fill();

            // Pupils/Irises
            ctx.fillStyle = state.eyeColor;
            ctx.beginPath();
            if (state.eyeStyle === 1 || state.eyeStyle === 4 || state.eyeStyle === 5) {
                ctx.arc(cx - ex, ey + 4, 10, 0, Math.PI*2);
                ctx.arc(cx + ex, ey + 4, 10, 0, Math.PI*2);
                ctx.fill();
                
                // Anime catchlights
                if (state.eyeStyle === 4) {
                    ctx.fillStyle = 'white';
                    ctx.beginPath();
                    ctx.arc(cx - ex + 4, ey, 4, 0, Math.PI*2);
                    ctx.arc(cx + ex + 4, ey, 4, 0, Math.PI*2);
                    ctx.fill();
                }
            } else {
                ctx.arc(cx - ex, ey + 5, 6, 0, Math.PI*2);
                ctx.arc(cx + ex, ey + 5, 6, 0, Math.PI*2);
                ctx.fill();
            }
        }

        function drawNose() {
            ctx.strokeStyle = shadeColor(state.skinTone, -25);
            ctx.lineWidth = 3;
            ctx.lineCap = "round";
            ctx.beginPath();
            
            const ny = cy + 25;
            if (state.noseStyle === 1) { // Button
                ctx.arc(cx, ny, 8, Math.PI, 0, true);
            } else if (state.noseStyle === 2) { // Pointed
                ctx.moveTo(cx, cy);
                ctx.lineTo(cx - 10, ny);
                ctx.lineTo(cx, ny + 5);
            } else if (state.noseStyle === 3) { // Broad
                ctx.moveTo(cx - 12, ny);
                ctx.quadraticCurveTo(cx, ny + 10, cx + 12, ny);
            }
            ctx.stroke();
        }

        function drawMouth() {
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 4;
            ctx.beginPath();
            const my = cy + 55;

            if (state.mouthStyle === 1) { // Smile
                ctx.arc(cx, my - 10, 25, 0.2, Math.PI - 0.2, false);
                ctx.stroke();
            } else if (state.mouthStyle === 2) { // Neutral
                ctx.moveTo(cx - 20, my); ctx.lineTo(cx + 20, my); ctx.stroke();
            } else if (state.mouthStyle === 3) { // Grin
                ctx.fillStyle = 'white';
                ctx.arc(cx, my - 5, 25, 0, Math.PI, false);
                ctx.fill(); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(cx - 25, my - 5); ctx.lineTo(cx + 25, my - 5); ctx.stroke();
            } else if (state.mouthStyle === 4) { // Surprised
                ctx.fillStyle = '#222';
                ctx.ellipse(cx, my + 5, 12, 18, 0, 0, Math.PI*2);
                ctx.fill();
            } else if (state.mouthStyle === 5) { // Frown
                ctx.arc(cx, my + 15, 25, Math.PI + 0.2, Math.PI*2 - 0.2, false);
                ctx.stroke();
            } else if (state.mouthStyle === 6) { // Smirk
                ctx.moveTo(cx - 20, my);
                ctx.quadraticCurveTo(cx, my + 10, cx + 25, my - 15);
                ctx.stroke();
            }
        }

        function drawFacialHairBase() {
            if (state.facialHair === 1) { // Stubble (dots)
                ctx.fillStyle = shadeColor(state.skinTone, -30);
                for(let i=0; i<100; i++) {
                    let rx = cx - 60 + Math.random() * 120;
                    let ry = cy + 40 + Math.random() * 50;
                    // Keep roughly within jaw
                    if (Math.pow(rx - cx, 2) + Math.pow(ry - (cy+40), 2) < 4000) {
                        ctx.fillRect(rx, ry, 2, 2);
                    }
                }
            } else if (state.facialHair === 3) { // Full Beard Base
                ctx.fillStyle = state.hairColor;
                ctx.beginPath();
                ctx.moveTo(cx - state.faceWidth + 5, cy + 20);
                ctx.quadraticCurveTo(cx - state.faceWidth, cy + 120, cx, cy + 130);
                ctx.quadraticCurveTo(cx + state.faceWidth, cy + 120, cx + state.faceWidth - 5, cy + 20);
                ctx.fill();
            }
        }

        function drawFacialHairFront() {
            ctx.fillStyle = state.hairColor;
            if (state.facialHair === 2 || state.facialHair === 3) { // Goatee or Full Beard stache
                ctx.beginPath();
                ctx.arc(cx, cy + 45, 25, Math.PI, 0, false);
                ctx.fill();
                ctx.fillRect(cx - 20, cy + 65, 40, 15);
            }
        }

        function drawHairBack() {
            if (state.hairStyle === 3) { // Long Flowing
                ctx.fillStyle = state.hairColor;
                ctx.beginPath();
                ctx.moveTo(cx - 70, cy - 80);
                ctx.quadraticCurveTo(cx - 140, cy + 80, cx - 100, cy + 180);
                ctx.lineTo(cx + 100, cy + 180);
                ctx.quadraticCurveTo(cx + 140, cy + 80, cx + 70, cy - 80);
                ctx.fill();
            } else if (state.hairStyle === 6) { // Curly width
                ctx.fillStyle = state.hairColor;
                ctx.beginPath();
                ctx.arc(cx - 70, cy - 60, 40, 0, Math.PI*2);
                ctx.arc(cx + 70, cy - 60, 40, 0, Math.PI*2);
                ctx.fill();
            }
        }

        function drawHairFront() {
            ctx.fillStyle = state.hairColor;
            
            if (state.hairStyle === 1) { // Short
                ctx.beginPath(); ctx.arc(cx, cy - 80, 85, Math.PI, 0, false); ctx.fill();
            } else if (state.hairStyle === 2) { // Spiky Anime
                ctx.beginPath();
                ctx.moveTo(cx - 85, cy - 50); ctx.lineTo(cx - 70, cy - 140); ctx.lineTo(cx - 30, cy - 90);
                ctx.lineTo(cx - 10, cy - 170); ctx.lineTo(cx + 20, cy - 90); ctx.lineTo(cx + 60, cy - 150);
                ctx.lineTo(cx + 85, cy - 50); ctx.fill();
            } else if (state.hairStyle === 4) { // Bun
                ctx.beginPath(); ctx.arc(cx, cy - 130, 45, 0, Math.PI*2); ctx.fill(); // Bun
                ctx.beginPath(); ctx.arc(cx, cy - 80, 85, Math.PI, 0, false); ctx.fill(); // Base
            } else if (state.hairStyle === 5) { // Undercut
                ctx.fillStyle = shadeColor(state.hairColor, 30); // shaved sides
                ctx.beginPath(); ctx.arc(cx, cy - 80, 80, Math.PI, 0, false); ctx.fill();
                ctx.fillStyle = state.hairColor; // top flop
                ctx.beginPath();
                ctx.moveTo(cx - 50, cy - 110);
                ctx.quadraticCurveTo(cx - 90, cy - 50, cx - 100, cy - 30);
                ctx.quadraticCurveTo(cx, cy - 160, cx + 60, cy - 110);
                ctx.fill();
            } else if (state.hairStyle === 6) { // Curly Top
                for(let i=0; i<15; i++) {
                    ctx.beginPath();
                    ctx.arc(cx - 60 + (i*9), cy - 90 - Math.sin(i)*30, 25, 0, Math.PI*2);
                    ctx.fill();
                }
            } else if (state.hairStyle === 3) { // Flowing Bangs
                ctx.beginPath();
                ctx.moveTo(cx, cy - 100); ctx.quadraticCurveTo(cx - 80, cy - 100, cx - 90, cy);
                ctx.lineTo(cx - 60, cy - 100); ctx.fill();
                ctx.beginPath();
                ctx.moveTo(cx, cy - 100); ctx.quadraticCurveTo(cx + 80, cy - 100, cx + 90, cy);
                ctx.lineTo(cx + 60, cy - 100); ctx.fill();
            }
        }

        function drawHeadwear() {
            ctx.fillStyle = state.hairColor; // Sync hat color to hair color picker for ease
            
            if (state.headwear === 1) { // Baseball Cap
                ctx.beginPath();
                ctx.arc(cx, cy - 80, 85, Math.PI, 0, false); // Dome
                ctx.fill();
                ctx.fillStyle = shadeColor(state.hairColor, -20);
                ctx.beginPath(); // Brim
                ctx.moveTo(cx - 90, cy - 70);
                ctx.quadraticCurveTo(cx, cy - 100, cx + 120, cy - 60);
                ctx.quadraticCurveTo(cx + 120, cy - 50, cx - 90, cy - 60);
                ctx.fill();
            } else if (state.headwear === 2) { // Winter Beanie
                ctx.beginPath();
                ctx.arc(cx, cy - 70, 85, Math.PI, 0, false);
                ctx.fill();
                ctx.fillStyle = shadeColor(state.hairColor, 15);
                ctx.fillRect(cx - 90, cy - 75, 180, 25); // Fold
                ctx.beginPath(); // Pom Pom
                ctx.arc(cx, cy - 160, 30, 0, Math.PI*2);
                ctx.fill();
            } else if (state.headwear === 3) { // Turban / Joora Wrap
                ctx.fillStyle = state.hairColor;
                
                // Base wrap shape
                ctx.beginPath();
                ctx.moveTo(cx - 90, cy - 50);
                ctx.quadraticCurveTo(cx - 100, cy - 140, cx, cy - 160);
                ctx.quadraticCurveTo(cx + 100, cy - 140, cx + 90, cy - 50);
                ctx.quadraticCurveTo(cx, cy - 30, cx - 90, cy - 50);
                ctx.fill();

                // Distinctive fabric folds/wraps
                ctx.strokeStyle = shadeColor(state.hairColor, -20);
                ctx.lineWidth = 4;
                
                // Front V-folds
                ctx.beginPath(); ctx.moveTo(cx, cy - 40); ctx.lineTo(cx - 70, cy - 120); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(cx, cy - 40); ctx.lineTo(cx + 70, cy - 120); ctx.stroke();
                
                ctx.beginPath(); ctx.moveTo(cx, cy - 60); ctx.lineTo(cx - 85, cy - 100); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(cx, cy - 60); ctx.lineTo(cx + 85, cy - 100); ctx.stroke();

                ctx.beginPath(); ctx.moveTo(cx, cy - 80); ctx.lineTo(cx - 60, cy - 150); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(cx, cy - 80); ctx.lineTo(cx + 60, cy - 150); ctx.stroke();
            }
        }

        function drawGlasses() {
            if (state.glasses === 0) return;
            ctx.strokeStyle = '#111';
            ctx.lineWidth = 6;
            
            const gy = cy - 10;

            if (state.glasses === 1) { // Round
                ctx.beginPath(); ctx.arc(cx - 40, gy, 30, 0, Math.PI*2); ctx.stroke();
                ctx.beginPath(); ctx.arc(cx + 40, gy, 30, 0, Math.PI*2); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(cx - 10, gy); ctx.lineTo(cx + 10, gy); ctx.stroke(); // Bridge
            } else if (state.glasses === 2) { // Cyber Visor
                ctx.fillStyle = 'rgba(0, 255, 204, 0.7)';
                ctx.beginPath(); ctx.moveTo(cx - 80, gy - 20); ctx.lineTo(cx + 80, gy - 20);
                ctx.lineTo(cx + 60, gy + 20); ctx.lineTo(cx - 60, gy + 20);
                ctx.fill(); ctx.stroke();
            } else if (state.glasses === 3) { // Dark Shades
                ctx.fillStyle = '#111';
                ctx.beginPath(); ctx.moveTo(cx - 80, gy - 20); ctx.lineTo(cx - 5, gy - 20); ctx.lineTo(cx - 20, gy + 20); ctx.lineTo(cx - 70, gy + 20); ctx.fill();
                ctx.beginPath(); ctx.moveTo(cx + 80, gy - 20); ctx.lineTo(cx + 5, gy - 20); ctx.lineTo(cx + 20, gy + 20); ctx.lineTo(cx + 70, gy + 20); ctx.fill();
                ctx.beginPath(); ctx.moveTo(cx - 10, gy - 15); ctx.lineTo(cx + 10, gy - 15); ctx.stroke();
            } else if (state.glasses === 4) { // Square
                ctx.strokeRect(cx - 75, gy - 20, 65, 40);
                ctx.strokeRect(cx + 10, gy - 20, 65, 40);
                ctx.beginPath(); ctx.moveTo(cx - 10, gy - 5); ctx.lineTo(cx + 10, gy - 5); ctx.stroke();
            }
        }

        // Color Math Helper
        function shadeColor(color, percent) {
            let R = parseInt(color.substring(1,3),16);
            let G = parseInt(color.substring(3,5),16);
            let B = parseInt(color.substring(5,7),16);
            R = parseInt(R * (100 + percent) / 100);
            G = parseInt(G * (100 + percent) / 100);
            B = parseInt(B * (100 + percent) / 100);
            R = (R<255)?R:255;  G = (G<255)?G:255;  B = (B<255)?B:255;
            R = Math.round(R); G = Math.round(G); B = Math.round(B);
            let RR = ((R.toString(16).length==1)?"0"+R.toString(16):R.toString(16));
            let GG = ((G.toString(16).length==1)?"0"+G.toString(16):G.toString(16));
            let BB = ((B.toString(16).length==1)?"0"+B.toString(16):B.toString(16));
            return "#"+RR+GG+BB;
        }

        // --- 5. EXPORT ---
        document.getElementById('exportBtn').addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'galaxy-pro-avatar.png';
            link.href = canvas.toDataURL('image/png', 1.0);
            link.click();
        });

        // Initial Draw
        renderAvatar();
    </script>
</body>
</html>
