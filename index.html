<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biometric Topography Engine</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --bg-void: #000205;
            --data-cyan: #00f0ff;
            --data-blue: #0055ff;
            --alert-red: #ff003c;
            --panel-bg: rgba(0, 5, 15, 0.8);
        }

        body {
            margin: 0; overflow: hidden; background-color: var(--bg-void);
            color: var(--data-cyan); font-family: 'Courier New', monospace; user-select: none;
        }

        #webgl-canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }

        /* PIP Camera Feed */
        #video-feed {
            position: absolute; bottom: 30px; left: 30px; width: 280px;
            border: 1px solid var(--data-cyan); z-index: 10;
            filter: grayscale(100%) contrast(150%) brightness(0.8);
            transform: scaleX(-1); opacity: 0.7; mix-blend-mode: screen;
        }

        /* Cyber UI Overlays */
        .hud-panel {
            position: absolute; background: var(--panel-bg);
            border: 1px solid var(--data-blue); z-index: 10; padding: 20px;
            box-shadow: 0 0 15px rgba(0, 85, 255, 0.2); backdrop-filter: blur(5px);
        }

        #telemetry-hud { top: 30px; right: 30px; width: 320px; border-left: 3px solid var(--data-cyan); }
        #audio-hud { bottom: 30px; right: 30px; width: 320px; border-right: 3px solid var(--data-cyan); }
        
        h1 { margin: 0 0 15px 0; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 3px; border-bottom: 1px solid var(--data-blue); padding-bottom: 8px;}
        
        .data-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 0.85rem; }
        .data-label { color: #5588ff; }
        .data-val { font-weight: bold; text-shadow: 0 0 5px var(--data-cyan); }
        
        /* Audio Visualizer */
        .meter-container { width: 100%; height: 8px; background: #001133; margin-top: 10px; }
        #audio-bar { width: 0%; height: 100%; background: var(--data-cyan); transition: width 0.05s ease-out; box-shadow: 0 0 10px var(--data-cyan); }

        /* Crosshairs */
        .crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 40px; height: 40px; pointer-events: none; z-index: 5; opacity: 0.5;
        }
        .crosshair::before, .crosshair::after { content: ''; position: absolute; background: var(--data-cyan); }
        .crosshair::before { top: 50%; left: -10px; width: 60px; height: 1px; }
        .crosshair::after { top: -10px; left: 50%; width: 1px; height: 60px; }

        #loading {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg-void); z-index: 999; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner {
            width: 60px; height: 60px; border: 2px solid transparent;
            border-top-color: var(--data-cyan); border-bottom-color: var(--data-blue);
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <h2 style="margin-top: 20px; letter-spacing: 4px;">INITIALIZING TOPOGRAPHY MATRIX</h2>
        <p style="color: #5588ff; font-size: 0.8rem;">Awaiting WebRTC Media Streams...</p>
    </div>

    <canvas id="webgl-canvas"></canvas>
    <div class="crosshair"></div>
    <video id="video-feed" autoplay playsinline></video>

    <div class="hud-panel" id="telemetry-hud">
        <h1>SPATIAL DATA STREAM</h1>
        <div class="data-row"><span class="data-label">AI_UPLINK:</span><span class="data-val" id="sys-state" style="color: #ffaa00;">AWAITING</span></div>
        <div class="data-row"><span class="data-label">VERTICES_MAPPED:</span><span class="data-val" id="nodes-tracked">0 / 478</span></div>
        <div class="data-row"><span class="data-label">X_PITCH:</span><span class="data-val" id="val-pitch">0.00°</span></div>
        <div class="data-row"><span class="data-label">Y_YAW:</span><span class="data-val" id="val-yaw">0.00°</span></div>
        <div class="data-row"><span class="data-label">Z_ROLL:</span><span class="data-val" id="val-roll">0.00°</span></div>
        <div class="data-row"><span class="data-label">Z_DEPTH_DELTA:</span><span class="data-val" id="val-depth">0.00 units</span></div>
        <div class="data-row"><span class="data-label">OCULAR_STATE:</span><span class="data-val" id="val-eyes">ANALYZING</span></div>
    </div>

    <div class="hud-panel" id="audio-hud">
        <h1>ENVIRONMENTAL AUDIO</h1>
        <div class="data-row"><span class="data-label">MIC_INPUT:</span><span class="data-val" id="aud-level">0.0 dB</span></div>
        <div class="data-row"><span class="data-label">MESH_RESONANCE:</span><span class="data-val">ACTIVE</span></div>
        <div class="meter-container"><div id="audio-bar"></div></div>
    </div>

    <script>
        // ==========================================
        // 1. ADVANCED WEBGL & BLOOM COMPOSER
        // ==========================================
        const canvas = document.getElementById('webgl-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true, powerPreference: "high-performance" });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000205, 0.0006);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 5000);
        camera.position.set(0, 0, 800);

        // Grid Background
        const grid = new THREE.GridHelper(5000, 100, 0x0055ff, 0x001122);
        grid.position.y = -400; grid.position.z = -500;
        scene.add(grid);
        const gridTop = new THREE.GridHelper(5000, 100, 0x0055ff, 0x001122);
        gridTop.position.y = 400; gridTop.position.z = -500;
        scene.add(gridTop);

        // Post-Processing (Unreal Bloom for the glowing effect)
        const renderScene = new THREE.RenderPass(scene, camera);
        const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.1);
        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // ==========================================
        // 2. PROCEDURAL TOPOGRAPHY MESH
        // ==========================================
        const faceGroup = new THREE.Group();
        scene.add(faceGroup);

        // A. The Vertices (Glowing Dots)
        const nodeGeo = new THREE.BufferGeometry();
        const nodePositions = new Float32Array(478 * 3);
        nodeGeo.setAttribute('position', new THREE.BufferAttribute(nodePositions, 3));
        
        const nodeMat = new THREE.PointsMaterial({ color: 0x00f0ff, size: 2.5, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending });
        const faceNodes = new THREE.Points(nodeGeo, nodeMat);
        faceGroup.add(faceNodes);

        // B. The Topography Wireframe
        // We algorithmically connect adjacent nodes to create a 3D web over the face
        const wireMat = new THREE.LineBasicMaterial({ color: 0x0055ff, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending });
        
        const indexArray = [];
        // Approximate a grid connection for the 478 nodes
        for(let i=0; i<470; i+=2) { indexArray.push(i, i+1, i+1, i+2, i+2, i); }
        nodeGeo.setIndex(indexArray);
        
        const faceWireframe = new THREE.LineSegments(nodeGeo, wireMat);
        faceGroup.add(faceWireframe);

        // ==========================================
        // 3. HARDWARE UPLINK (A/V Streams)
        // ==========================================
        const videoElement = document.getElementById('video-feed');
        let audioContext, analyser, dataArray;
        let currentVolume = 0;

        // Request Both Video AND Audio
        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then((stream) => {
                videoElement.srcObject = stream;
                
                // Initialize Web Audio API
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                initAI(); // Start Machine Learning
            })
            .catch((err) => {
                console.error("Hardware Access Denied:", err);
                document.getElementById('sys-state').innerText = "ACCESS DENIED";
                document.getElementById('sys-state').style.color = "#ff003c";
            });

        // ==========================================
        // 4. ML TRACKING & LERP SMOOTHING
        // ==========================================
        let smoothedPos = new Float32Array(478 * 3);

        function initAI() {
            const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
            faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.65, minTrackingConfidence: 0.65 });

            faceMesh.onResults((results) => {
                document.getElementById('loading').style.display = 'none';

                if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                    document.getElementById('sys-state').innerText = "DATA SYNCED";
                    document.getElementById('sys-state').style.color = "#00f0ff";
                    document.getElementById('nodes-tracked').innerText = "478 / 478";

                    const landmarks = results.multiFaceLandmarks[0];
                    const rawPos = faceNodes.geometry.attributes.position.array;

                    // 1. Calculate Spatial Coordinates & Apply Linear Interpolation
                    for (let i = 0; i < landmarks.length; i++) {
                        // Expand the nodes into a 3D space (-800 to 800 roughly)
                        const tx = (landmarks[i].x - 0.5) * -1200; 
                        const ty = (landmarks[i].y - 0.5) * -1200;
                        const tz = landmarks[i].z * 1200;

                        // Lerp for smooth tracking (0.6 is the stiffness factor)
                        smoothedPos[i*3] += (tx - smoothedPos[i*3]) * 0.6;
                        smoothedPos[i*3+1] += (ty - smoothedPos[i*3+1]) * 0.6;
                        smoothedPos[i*3+2] += (tz - smoothedPos[i*3+2]) * 0.6;

                        // Apply audio reactivity to the Z-depth (makes the face pulse forward on loud sounds)
                        const audioBump = (currentVolume * 0.15) * (1.0 - Math.abs(landmarks[i].z)); 

                        rawPos[i*3] = smoothedPos[i*3];
                        rawPos[i*3+1] = smoothedPos[i*3+1];
                        rawPos[i*3+2] = smoothedPos[i*3+2] + audioBump;
                    }
                    faceNodes.geometry.attributes.position.needsUpdate = true;

                    // 2. Spatial Telemetry Math
                    const lEye = landmarks[133]; const rEye = landmarks[362]; const chin = landmarks[152]; const nose = landmarks[1];
                    const pitch = Math.atan2(chin.z - lEye.z, chin.y - lEye.y);
                    const yaw = Math.atan2(rEye.z - lEye.z, rEye.x - lEye.x);
                    const roll = Math.atan2(rEye.y - lEye.y, rEye.x - lEye.x);

                    document.getElementById('val-pitch').innerText = (pitch * (180/Math.PI)).toFixed(2) + "°";
                    document.getElementById('val-yaw').innerText = (yaw * (180/Math.PI)).toFixed(2) + "°";
                    document.getElementById('val-roll').innerText = (roll * (180/Math.PI)).toFixed(2) + "°";
                    document.getElementById('val-depth').innerText = (nose.z * 1000).toFixed(2);

                    // 3. Eye Aspect Ratio (Blink Detection)
                    const earH = Math.abs(landmarks[159].y - landmarks[145].y);
                    const earW = Math.abs(landmarks[133].x - landmarks[33].x);
                    const isBlink = (earH / earW) < 0.22;
                    document.getElementById('val-eyes').innerText = isBlink ? "CLOSED" : "TRACKING";
                    document.getElementById('val-eyes').style.color = isBlink ? "#ff003c" : "#00f0ff";

                    // Slowly rotate the entire face group slightly based on yaw for 3D depth effect
                    faceGroup.rotation.y = yaw * 0.2;
                    faceGroup.rotation.x = pitch * 0.2;

                } else {
                    document.getElementById('sys-state').innerText = "SEARCHING";
                    document.getElementById('sys-state').style.color = "#ff003c";
                }
            });

            const cam = new Camera(videoElement, { onFrame: async () => { await faceMesh.send({image: videoElement}); }, width: 640, height: 480 });
            cam.start();
        }

        // ==========================================
        // 5. RENDER & AUDIO PROCESSING LOOP
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);
            
            // Environment Animation
            grid.position.z = (Date.now() * 0.1) % 100;
            gridTop.position.z = (Date.now() * 0.1) % 100;

            // Audio Processing
            if (analyser) {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for(let i = 0; i < dataArray.length; i++) { sum += dataArray[i]; }
                currentVolume = sum / dataArray.length;

                // Update UI Meter
                document.getElementById('aud-level').innerText = currentVolume.toFixed(1) + " dB";
                document.getElementById('audio-bar').style.width = Math.min((currentVolume / 150) * 100, 100) + "%";

                // Audio Reactive Bloom (GPU lighting intensifies with volume)
                bloomPass.strength = 1.2 + (currentVolume * 0.02);
            }

            composer.render();
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
