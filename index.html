<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA-MATRIX NEURAL ENGINE v7.0</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --bg-void: #00050b;
            --hud-color: #69BE28; /* Action Green */
            --trim-color: #002244; /* College Navy */
            --danger: #ff0055;
            --panel-bg: rgba(0, 10, 20, 0.7);
        }

        body {
            margin: 0; overflow: hidden; background-color: var(--bg-void);
            color: var(--hud-color); font-family: 'Consolas', 'Courier New', monospace;
            user-select: none;
        }

        #webgl-canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }

        /* PIP Camera Feed */
        #video-feed {
            position: absolute; bottom: 30px; left: 30px; width: 320px;
            border: 2px solid var(--hud-color); border-radius: 4px;
            z-index: 10; filter: grayscale(100%) contrast(150%);
            transform: scaleX(-1); box-shadow: 0 0 30px rgba(105, 190, 40, 0.3);
        }

        /* Cyber UI Overlay */
        .hud-panel {
            position: absolute; background: var(--panel-bg);
            border: 1px solid var(--hud-color); backdrop-filter: blur(8px);
            z-index: 10; padding: 20px; box-shadow: inset 0 0 20px rgba(0, 34, 68, 0.8);
        }

        #telemetry { top: 30px; right: 30px; width: 350px; border-top: 4px solid var(--hud-color); }
        
        h1 { margin: 0 0 15px 0; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px var(--hud-color); }
        
        .data-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #004488; font-size: 0.9rem; }
        .data-label { color: #88bbff; }
        .data-val { font-weight: bold; text-shadow: 0 0 8px var(--hud-color); }
        
        .alert { color: var(--danger); text-shadow: 0 0 10px var(--danger); animation: flash 0.5s infinite; }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Scanline Overlay */
        .scanlines {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            z-index: 5; pointer-events: none;
        }

        #loading {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg-void); z-index: 999; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner {
            width: 80px; height: 80px; border: 4px solid transparent;
            border-top-color: var(--hud-color); border-bottom-color: var(--trim-color);
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <h2 style="margin-top: 30px; letter-spacing: 5px; text-shadow: 0 0 15px var(--hud-color);">COMPILING ML SHADERS</h2>
        <p style="color: #88bbff;">Awaiting Localhost Camera Handshake...</p>
    </div>

    <canvas id="webgl-canvas"></canvas>
    <div class="scanlines"></div>
    <video id="video-feed" autoplay playsinline></video>

    <div class="hud-panel" id="telemetry">
        <h1>BIOMETRIC UPLINK</h1>
        <div class="data-row"><span class="data-label">SYS_STATE:</span><span class="data-val" id="sys-state" style="color: #ffaa00;">AWAITING FEED</span></div>
        <div class="data-row"><span class="data-label">NODES_TRACKED:</span><span class="data-val" id="nodes-tracked">0 / 478</span></div>
        <div class="data-row"><span class="data-label">PITCH_AXIS (X):</span><span class="data-val" id="val-pitch">0.00°</span></div>
        <div class="data-row"><span class="data-label">YAW_AXIS (Y):</span><span class="data-val" id="val-yaw">0.00°</span></div>
        <div class="data-row"><span class="data-label">ROLL_AXIS (Z):</span><span class="data-val" id="val-roll">0.00°</span></div>
        <div class="data-row"><span class="data-label">MOUTH_APERTURE:</span><span class="data-val" id="val-mouth">0.00 mm</span></div>
        <div class="data-row"><span class="data-label">OCULAR_STATUS:</span><span class="data-val" id="val-eyes">OPEN</span></div>
        <div style="margin-top: 15px; text-align: center; font-weight: bold; display: none;" id="tongue-alert" class="alert">ACTION: TONGUE DEPLOYED</div>
    </div>

    <script>
        // ==========================================
        // 1. ADVANCED THREE.JS + BLOOM COMPOSER
        // ==========================================
        const canvas = document.getElementById('webgl-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true, powerPreference: "high-performance" });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x00050b, 0.0007);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 5000);
        camera.position.set(0, 50, 900);

        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.3));
        const dirLight = new THREE.DirectionalLight(0x69BE28, 2.0);
        dirLight.position.set(200, 500, 300);
        scene.add(dirLight);
        const backLight = new THREE.DirectionalLight(0x002244, 3.0);
        backLight.position.set(-200, -200, -300);
        scene.add(backLight);

        // --- POST PROCESSING (Unreal Bloom) ---
        const renderScene = new THREE.RenderPass(scene, camera);
        // Resolution, strength, radius, threshold
        const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.8, 0.4, 0.1);
        
        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // Cyber Grid Floor
        const grid = new THREE.GridHelper(4000, 80, 0x002244, 0x001122);
        grid.position.y = -400;
        scene.add(grid);

        // ==========================================
        // 2. PROCEDURAL GLSL SHADERS
        // ==========================================
        const holoVert = `
            varying vec3 vNormal; varying vec3 vViewPosition;
            void main() {
                vNormal = normalize(normalMatrix * normal);
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                vViewPosition = -mvPosition.xyz;
                gl_Position = projectionMatrix * mvPosition;
            }
        `;
        const holoFrag = `
            uniform vec3 color; uniform float time;
            varying vec3 vNormal; varying vec3 vViewPosition;
            void main() {
                vec3 normal = normalize(vNormal); vec3 viewDir = normalize(vViewPosition);
                float fresnel = dot(normal, viewDir);
                fresnel = clamp(1.0 - fresnel, 0.0, 1.0);
                fresnel = pow(fresnel, 2.5);
                float scanline = sin(gl_FragCoord.y * 0.3 + time * 8.0) * 0.1;
                gl_FragColor = vec4(color * (fresnel + 0.4) + scanline, 0.9);
            }
        `;

        const uniforms = { color: { value: new THREE.Color(0x002244) }, time: { value: 0.0 } }; // Navy Shader
        const cyberMat = new THREE.ShaderMaterial({
            uniforms: uniforms, vertexShader: holoVert, fragmentShader: holoFrag,
            transparent: true, side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false
        });

        // ==========================================
        // 3. THE 956-NODE ARCHITECTURE (Nodes + Body)
        // ==========================================
        const agentRig = new THREE.Group();
        scene.add(agentRig);

        // A. 478 Glowing Face Nodes
        const nodeGeo = new THREE.BufferGeometry();
        const nodePositions = new Float32Array(478 * 3);
        nodeGeo.setAttribute('position', new THREE.BufferAttribute(nodePositions, 3));
        const nodeMat = new THREE.PointsMaterial({ color: 0x69BE28, size: 5, transparent: true, opacity: 1.0, blending: THREE.AdditiveBlending });
        const faceNodes = new THREE.Points(nodeGeo, nodeMat);
        agentRig.add(faceNodes);

        // B. Cyber-Skeleton
        const skeleton = new THREE.Group();
        agentRig.add(skeleton);

        const neckGeo = new THREE.CylinderGeometry(40, 50, 140, 16);
        const neck = new THREE.Mesh(neckGeo, cyberMat);
        skeleton.add(neck);

        const torsoGeo = new THREE.BoxGeometry(320, 240, 100);
        const torso = new THREE.Mesh(torsoGeo, cyberMat);
        const torsoTrim = new THREE.LineSegments(new THREE.EdgesGeometry(torsoGeo), new THREE.LineBasicMaterial({ color: 0x69BE28, linewidth: 2 }));
        torso.add(torsoTrim);
        skeleton.add(torso);

        // C. Deployable Tongue
        const tongueGeo = new THREE.CapsuleGeometry(16, 45, 4, 32);
        const tongueMat = new THREE.MeshStandardMaterial({ color: 0xff0055, roughness: 0.2, emissive: 0x440011 });
        const tongue = new THREE.Mesh(tongueGeo, tongueMat);
        tongue.rotation.x = Math.PI / 2;
        tongue.scale.set(0.01, 0.01, 0.01); // Hidden
        agentRig.add(tongue);

        // D. High-Poly Joora / Patka Anchor
        const headwear = new THREE.Group();
        agentRig.add(headwear);

        const domeGeo = new THREE.SphereGeometry(95, 32, 16, 0, Math.PI * 2, 0, Math.PI * 0.55);
        const dome = new THREE.Mesh(domeGeo, cyberMat);
        dome.rotation.x = -0.2;
        
        const knotGeo = new THREE.TorusGeometry(30, 16, 16, 32);
        const knot = new THREE.Mesh(knotGeo, cyberMat);
        knot.position.set(0, 90, -20); knot.rotation.x = Math.PI / 2;
        
        headwear.add(dome); headwear.add(knot);

        // ==========================================
        // 4. ML TRACKING LOGIC & LERPING
        // ==========================================
        let smoothedPos = new Float32Array(478 * 3);
        let smoothedMouth = 0;

        function calculateEAR(landmarks) {
            const top = landmarks[159]; const bot = landmarks[145];
            const inr = landmarks[133]; const out = landmarks[33];
            const h = Math.sqrt(Math.pow(top.x - bot.x, 2) + Math.pow(top.y - bot.y, 2));
            const w = Math.sqrt(Math.pow(inr.x - out.x, 2) + Math.pow(inr.y - out.y, 2));
            return h / w;
        }

        const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.65, minTrackingConfidence: 0.65 });

        faceMesh.onResults((results) => {
            document.getElementById('loading').style.display = 'none';

            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                document.getElementById('sys-state').innerText = "TRACKING LOCKED";
                document.getElementById('sys-state').style.color = "#69BE28";
                document.getElementById('nodes-tracked').innerText = "478 / 478";

                const landmarks = results.multiFaceLandmarks[0];
                const rawPos = faceNodes.geometry.attributes.position.array;
                let cx = 0, cy = 0, cz = 0, chinX = 0, chinY = 0, chinZ = 0, mouthX = 0, mouthY = 0, mouthZ = 0;

                // 1. Process Nodes with Linear Interpolation
                for (let i = 0; i < landmarks.length; i++) {
                    const tx = (landmarks[i].x - 0.5) * -1300; 
                    const ty = (landmarks[i].y - 0.5) * -1300;
                    const tz = landmarks[i].z * 1300;

                    smoothedPos[i*3] += (tx - smoothedPos[i*3]) * 0.6;
                    smoothedPos[i*3+1] += (ty - smoothedPos[i*3+1]) * 0.6;
                    smoothedPos[i*3+2] += (tz - smoothedPos[i*3+2]) * 0.6;

                    rawPos[i*3] = smoothedPos[i*3];
                    rawPos[i*3+1] = smoothedPos[i*3+1];
                    rawPos[i*3+2] = smoothedPos[i*3+2];

                    if (i === 1) { cx = rawPos[i*3]; cy = rawPos[i*3+1]; cz = rawPos[i*3+2]; } 
                    if (i === 152) { chinX = rawPos[i*3]; chinY = rawPos[i*3+1]; chinZ = rawPos[i*3+2]; } 
                    if (i === 13) { mouthX = rawPos[i*3]; mouthY = rawPos[i*3+1]; mouthZ = rawPos[i*3+2]; } 
                }
                faceNodes.geometry.attributes.position.needsUpdate = true;

                // 2. Telemetry (Atan2 Trig)
                const pitch = Math.atan2(landmarks[152].z - landmarks[133].z, landmarks[152].y - landmarks[133].y);
                const yaw = Math.atan2(landmarks[362].z - landmarks[133].z, landmarks[362].x - landmarks[133].x);
                const roll = Math.atan2(landmarks[362].y - landmarks[133].y, landmarks[362].x - landmarks[133].x);

                document.getElementById('val-pitch').innerText = (pitch * (180/Math.PI)).toFixed(1) + "°";
                document.getElementById('val-yaw').innerText = (yaw * (180/Math.PI)).toFixed(1) + "°";
                document.getElementById('val-roll').innerText = (roll * (180/Math.PI)).toFixed(1) + "°";

                // 3. Blink Detection
                const ear = calculateEAR(landmarks);
                document.getElementById('val-eyes').innerText = ear < 0.22 ? "CLOSED" : "OPEN";
                document.getElementById('val-eyes').style.color = ear < 0.22 ? "#ff0055" : "#69BE28";

                // 4. Tongue Trigger Logic
                const targetMouthDist = Math.abs(landmarks[13].y - landmarks[14].y);
                smoothedMouth += (targetMouthDist - smoothedMouth) * 0.4;
                document.getElementById('val-mouth').innerText = (smoothedMouth * 100).toFixed(2) + " mm";
                
                if (smoothedMouth > 0.055) {
                    const ext = Math.min((smoothedMouth - 0.055) * 18, 1.8);
                    tongue.scale.set(ext, ext, ext);
                    tongue.position.set(mouthX, mouthY - 12, mouthZ + (ext * 18));
                    tongue.rotation.set(pitch + (Math.PI/2), yaw, roll);
                    document.getElementById('tongue-alert').style.display = 'block';
                } else {
                    tongue.scale.set(0.01, 0.01, 0.01);
                    document.getElementById('tongue-alert').style.display = 'none';
                }

                // 5. Apply Rig Rotations
                neck.position.set(chinX, chinY - 50, chinZ - 40);
                neck.rotation.set(pitch, yaw, roll);

                torso.position.set(chinX, chinY - 220, chinZ - 60);
                torso.rotation.set(0, yaw * 0.4, roll * 0.2);

                headwear.position.set(rawPos[10*3], rawPos[10*3+1] + 20, rawPos[10*3+2] - 20);
                headwear.rotation.set(pitch + 0.1, yaw, roll);

            } else {
                document.getElementById('sys-state').innerText = "TARGET LOST";
                document.getElementById('sys-state').style.color = "#ff0055";
            }
        });

        const videoElement = document.getElementById('video-feed');
        const cam = new Camera(videoElement, {
            onFrame: async () => { await faceMesh.send({image: videoElement}); },
            width: 1280, height: 720
        });
        cam.start();

        // ==========================================
        // 5. RENDER LOOP (WITH BLOOM)
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);
            uniforms.time.value += 0.01;
            grid.position.z = (Date.now() * 0.1) % 100;
            
            // Render via Post-Processing Composer instead of standard renderer
            composer.render();
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
