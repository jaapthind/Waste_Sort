<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced 3D AI Face Tracker</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* The hidden video feed that the AI reads */
        .input_video {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        /* The 3D Canvas */
        #output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        #ui {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 20;
            background: rgba(0, 20, 10, 0.8);
            padding: 20px;
            border: 1px solid #00ffcc;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
        }

        h1 { margin: 0 0 10px 0; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px;}
        p { margin: 0; font-size: 0.9rem; color: #888; }
        .status { color: #ff3366; font-weight: bold; margin-top: 10px; display: block; animation: pulse 1.5s infinite;}

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="container">
        <video class="input_video" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
        
        <div id="ui">
            <h1>Neural Face Mesh v1.0</h1>
            <p>WebGL + MediaPipe Active</p>
            <span class="status" id="status-text">INITIALIZING AI MODELS... PLEASE WAIT.</span>
        </div>
    </div>

    <script>
        // --- 1. SETUP THREE.JS 3D SCENE ---
        const canvas = document.getElementById('output_canvas');
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        
        const scene = new THREE.Scene();
        
        // Setup Camera
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 500;

        // Create a Particle System to represent the face mesh
        const geometry = new THREE.BufferGeometry();
        // 468 points in the MediaPipe face mesh, 3 coordinates (x,y,z) each
        const positions = new Float32Array(468 * 3); 
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        
        // Make the face points look like glowing holographic dots
        const material = new THREE.PointsMaterial({ 
            color: 0x00ffcc, 
            size: 3.5,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending
        });
        
        const pointCloud = new THREE.Points(geometry, material);
        scene.add(pointCloud);

        // --- 2. SETUP GOOGLE MEDIAPIPE AI ---
        const videoElement = document.querySelector('.input_video');
        const statusText = document.getElementById('status-text');

        // Initialize the Neural Network
        const faceMesh = new FaceMesh({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
        }});

        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        // --- 3. THE AI PROCESSING LOOP ---
        faceMesh.onResults((results) => {
            statusText.innerText = "TRACKING ACTIVE - 468 NODES LOCKED";
            statusText.style.color = "#00ffcc";

            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const landmarks = results.multiFaceLandmarks[0];
                
                const positions = pointCloud.geometry.attributes.position.array;
                
                // Map the 2D AI data into the 3D WebGL space
                for (let i = 0; i < landmarks.length; i++) {
                    // We multiply by screen width/height to scale it up, 
                    // and subtract half to center it in the 3D scene
                    positions[i * 3] = (landmarks[i].x - 0.5) * -window.innerWidth; // X (flipped for mirror effect)
                    positions[i * 3 + 1] = (landmarks[i].y - 0.5) * -window.innerHeight; // Y
                    positions[i * 3 + 2] = landmarks[i].z * 500; // Z (depth)
                }
                
                // Tell WebGL to update the render
                pointCloud.geometry.attributes.position.needsUpdate = true;
            }
        });

        // Start the Webcam and feed it to the AI
        const cameraFeed = new Camera(videoElement, {
            onFrame: async () => {
                await faceMesh.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });
        cameraFeed.start();

        // --- 4. RENDER LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            
            // Add a slight rotation to the whole scene for a 3D effect
            if(pointCloud) {
                pointCloud.rotation.y = Math.sin(Date.now() * 0.001) * 0.1;
                pointCloud.rotation.x = Math.sin(Date.now() * 0.0005) * 0.05;
            }

            renderer.render(scene, camera);
        }
        animate();

        // Handle window resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
