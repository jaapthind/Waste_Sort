<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Avatar Creator Ultimate</title>
    <style>
        :root {
            --bg-primary: #f8f9fa;
            --text-primary: #212529;
            --accent-color: #007bff;
            --panel-bg: #ffffff;
            --shadow-soft: 0 4px 12px rgba(0,0,0,0.05);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- INTRO SCREEN --- */
        #intro-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s ease-out;
        }

        #intro-screen h1 {
            font-size: 3rem;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            margin-bottom: 2rem;
        }

        .start-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            border: none;
            border-radius: 30px;
            background: white;
            color: var(--accent-color);
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .start-btn:hover { transform: scale(1.05); }

        /* --- MAIN APP --- */
        #app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background: var(--panel-bg);
            box-shadow: var(--shadow-soft);
            opacity: 0;
            transition: opacity 0.5s ease-in;
        }

        /* HEADER */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
        }
        .header h2 { margin: 0; font-size: 1.2rem; }
        .icon-btn { font-size: 1.5rem; background: none; border: none; cursor: pointer; }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        /* AVATAR DISPLAY */
        .avatar-wrapper {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: #d4fc79; /* Light green background from image */
            background: linear-gradient(to bottom, #d4fc79 0%, #96e6a1 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        canvas {
            width: 100%;
            height: 100%;
        }

        .edit-btn {
            padding: 12px 40px;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            background: #e9ecef;
            color: var(--text-primary);
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .edit-btn:hover { background: #dde2e6; }

        /* SIDE BUTTONS */
        .side-btn {
            position: absolute;
            width: 50px; height: 50px;
            border-radius: 50%;
            background: #f1f3f5;
            border: none;
            font-size: 1.5rem;
            color: #adb5bd;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .btn-plus { left: 20px; top: 50%; transform: translateY(-50%); }
        .btn-more { right: 50px; bottom: 80px; background: #e9ecef; color: #495057; width: 40px; height: 40px; font-size: 1.2rem;}

        /* CAMERA OVERLAY */
        #camera-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        #video-feed { width: 90%; max-width: 400px; border-radius: 15px; transform: scaleX(-1); }
        .snap-btn {
            margin-top: 20px; padding: 15px 30px;
            background: var(--accent-color); color: white;
            border: none; border-radius: 30px; font-size: 1.1rem; font-weight: bold; cursor: pointer;
        }
        #flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; z-index: 300; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <h1>Galaxy Avatar</h1>
        <button class="start-btn" onclick="startApp()">Create My Avatar</button>
    </div>

    <div id="app-container">
        <div class="header">
            <button class="icon-btn">〈</button>
            <h2>Galaxy Avatar</h2>
            <button class="icon-btn" onclick="openCamera()">⋮</button>
        </div>

        <div class="main-content">
            <button class="side-btn btn-plus">+</button>
            
            <div class="avatar-wrapper">
                <canvas id="avatarCanvas" width="600" height="600"></canvas>
            </div>
            <button class="side-btn btn-more">⋯</button>

            <button class="edit-btn" onclick="openCamera()">Edit / New Snap</button>
        </div>
    </div>

    <div id="camera-modal">
        <video id="video-feed" autoplay playsinline></video>
        <button class="snap-btn" onclick="snapAndGenerate()">📸 Snap & Create Realistic Avatar</button>
    </div>
    <div id="flash"></div>

    <script>
        // --- 1. SETUP & STATE ---
        const canvas = document.getElementById('avatarCanvas');
        const ctx = canvas.getContext('2d');
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;

        let state = {
            skinTone: '#f5d0b0',
            hairColor: '#e6cba3', // Blonde from image
            eyeColor: '#5c4033', // Brown
            hairStyle: 'long_wavy',
            eyeStyle: 'soft',
            mouthStyle: 'smile'
        };

        // --- 2. APP FLOW ---
        function startApp() {
            document.getElementById('intro-screen').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('intro-screen').style.display = 'none';
                document.getElementById('app-container').style.opacity = 1;
                renderAvatar(); // Render default on start
            }, 500);
        }

        let stream;
        async function openCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                const video = document.getElementById('video-feed');
                video.srcObject = stream;
                document.getElementById('camera-modal').style.display = 'flex';
            } catch (err) {
                alert("Camera access denied. Please ensure you're on HTTPS.");
            }
        }

        function snapAndGenerate() {
            const video = document.getElementById('video-feed');
            const flash = document.getElementById('flash');
            
            // Flash FX
            flash.style.opacity = 1;
            setTimeout(() => flash.style.opacity = 0, 300);

            // 1. Capture & Analyze
            const hiddenCanvas = document.createElement('canvas');
            const hctx = hiddenCanvas.getContext('2d');
            hiddenCanvas.width = video.videoWidth; hiddenCanvas.height = video.videoHeight;
            hctx.drawImage(video, 0, 0);
            
            // Sample multiple facial points for better skin tone guess
            const p1 = hctx.getImageData(hiddenCanvas.width/2, hiddenCanvas.height/2, 1, 1).data; // center
            const p2 = hctx.getImageData(hiddenCanvas.width/2 - 50, hiddenCanvas.height/2 + 50, 1, 1).data; // cheek
            const avgR = (p1[0]+p2[0])/2, avgG = (p1[1]+p2[1])/2, avgB = (p1[2]+p2[2])/2;
            state.skinTone = `rgb(${avgR},${avgG},${avgB})`;

            // 2. "Realistic" Randomization (Simulating AI choice)
            const hairStyles = ['long_wavy', 'bob_cut', 'shoulder_layed'];
            state.hairStyle = hairStyles[Math.floor(Math.random() * hairStyles.length)];
            // Hair color guess (simplified: dark or light based on brightness)
            const brightness = (avgR*299 + avgG*587 + avgB*114) / 1000;
            state.hairColor = brightness > 128 ? '#e6cba3' : '#4a3021';

            // 3. Close & Render
            if (stream) stream.getTracks().forEach(track => track.stop());
            document.getElementById('camera-modal').style.display = 'none';
            renderAvatar();
        }

        // --- 3. ADVANCED RENDERING ENGINE ---
        function renderAvatar() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // No background needed, handled by CSS container

            // Draw from back to front
            drawHairBack();
            drawBody();
            drawHeadRealistic();
            drawFeaturesRealistic();
            drawHairFrontRealistic();
        }

        // Helper: Color luminocity shift
        function shade(col, amt) {
            let usePound = false;
            if (col[0] == "#") { col = col.slice(1); usePound = true; }
            let num = parseInt(col,16);
            let r = (num >> 16) + amt; if (r > 255) r = 255; else if  (r < 0) r = 0;
            let g = ((num >> 8) & 0x00FF) + amt; if (g > 255) g = 255; else if  (g < 0) g = 0;
            let b = (num & 0x0000FF) + amt; if (b > 255) b = 255; else if  (b < 0) b = 0;
            return (usePound?"#":"") + (g | (b << 8) | (r << 16)).toString(16).padStart(6,'0');
        }
        // Helper: RGB to Hex for shading function
        function rgbToHex(rgb) {
            if(rgb.startsWith('#')) return rgb;
            let [r,g,b] = rgb.match(/\d+/g).map(Number);
            return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
        }

        function drawBody() {
            // Realistic neck shadow
            let neckGrad = ctx.createRadialGradient(cx, cy + 140, 30, cx, cy + 140, 80);
            neckGrad.addColorStop(0, shade(rgbToHex(state.skinTone), -60));
            neckGrad.addColorStop(1, state.skinTone);
            ctx.fillStyle = neckGrad;
            ctx.fillRect(cx - 40, cy + 120, 80, 100);

            // White Shirt with soft shading
            let shirtGrad = ctx.createLinearGradient(cx, cy+180, cx, canvas.height);
            shirtGrad.addColorStop(0, '#ffffff');
            shirtGrad.addColorStop(1, '#f0f0f0');
            ctx.fillStyle = shirtGrad;
            ctx.beginPath();
            ctx.moveTo(cx, cy + 180);
            ctx.quadraticCurveTo(cx - 80, cy + 200, cx - 150, canvas.height);
            ctx.lineTo(cx + 150, canvas.height);
            ctx.quadraticCurveTo(cx + 80, cy + 200, cx, cy + 180);
            ctx.fill();
            
            // Collar detail
            ctx.strokeStyle = '#e0e0e0'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(cx, cy+180); ctx.lineTo(cx, cy+250); ctx.stroke();
        }

        function drawHeadRealistic() {
            const hexSkin = rgbToHex(state.skinTone);
            ctx.save();
            
            // Base head shape
            ctx.beginPath();
            ctx.moveTo(cx, cy + 160); // Chin
            ctx.bezierCurveTo(cx + 130, cy + 140, cx + 140, cy - 100, cx, cy - 140); // Right side
            ctx.bezierCurveTo(cx - 140, cy - 100, cx - 130, cy + 140, cx, cy + 160); // Left side
            ctx.clip(); // Clip all subsequent drawing to head shape

            // 1. Base Skin Tone
            ctx.fillStyle = state.skinTone;
            ctx.fillRect(0,0,canvas.width,canvas.height);

            // 2. Soft Cheek Blush & contour
            let blushGrad = ctx.createRadialGradient(cx - 70, cy + 30, 10, cx - 70, cy + 30, 60);
            blushGrad.addColorStop(0, shade(hexSkin, -30)); // Darker/Redder center
            blushGrad.addColorStop(1, 'transparent');
            ctx.globalAlpha = 0.4; ctx.fillStyle = blushGrad; ctx.fillRect(0,0,canvas.width,canvas.height);
            
            blushGrad = ctx.createRadialGradient(cx + 70, cy + 30, 10, cx + 70, cy + 30, 60);
            blushGrad.addColorStop(0, shade(hexSkin, -30));
            blushGrad.addColorStop(1, 'transparent');
            ctx.fillStyle = blushGrad; ctx.fillRect(0,0,canvas.width,canvas.height);

            // 3. Forehead/Nose Highlight
            let highGrad = ctx.createRadialGradient(cx, cy - 50, 20, cx, cy, 120);
            highGrad.addColorStop(0, shade(hexSkin, 40));
            highGrad.addColorStop(1, 'transparent');
            ctx.globalAlpha = 0.6; ctx.fillStyle = highGrad; ctx.fillRect(0,0,canvas.width,canvas.height);
            
            // 4. Jawline/Chin Shadow
            let jawGrad = ctx.createLinearGradient(0, cy+100, 0, cy+160);
            jawGrad.addColorStop(0, 'transparent');
            jawGrad.addColorStop(1, shade(hexSkin, -50));
            ctx.globalAlpha = 0.5; ctx.fillStyle = jawGrad; ctx.fillRect(0,0,canvas.width,canvas.height);

            ctx.restore();
        }

        function drawFeaturesRealistic() {
            // Nose (Soft shadow)
            ctx.fillStyle = shade(rgbToHex(state.skinTone), -30);
            ctx.globalAlpha = 0.4;
            ctx.beginPath();
            ctx.moveTo(cx - 10, cy + 40);
            ctx.quadraticCurveTo(cx, cy + 50, cx + 10, cy + 40);
            ctx.fill();
            ctx.globalAlpha = 1.0;

            // Mouth (Gradient lips)
            let lipGrad = ctx.createLinearGradient(0, cy+80, 0, cy+100);
            lipGrad.addColorStop(0, '#dba39a');
            lipGrad.addColorStop(1, '#c48b82');
            ctx.fillStyle = lipGrad;
            ctx.beginPath(); // Upper lip
            ctx.moveTo(cx - 30, cy + 85);
            ctx.quadraticCurveTo(cx, cy + 75, cx + 30, cy + 85);
            ctx.quadraticCurveTo(cx, cy + 90, cx - 30, cy + 85);
            ctx.fill();
            ctx.beginPath(); // Lower lip
            ctx.moveTo(cx - 30, cy + 85);
            ctx.quadraticCurveTo(cx, cy + 110, cx + 30, cy + 85);
            ctx.fill();

            // Eyes
            drawRealisticEye(cx - 55, cy - 10);
            drawRealisticEye(cx + 55, cy - 10);

            // Brows
            ctx.strokeStyle = shade(state.hairColor, -60);
            ctx.lineWidth = 8; ctx.lineCap = 'round';
            ctx.beginPath(); ctx.moveTo(cx-90, cy-40); ctx.quadraticCurveTo(cx-55, cy-55, cx-20, cy-40); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx+90, cy-40); ctx.quadraticCurveTo(cx+55, cy-55, cx+20, cy-40); ctx.stroke();
        }

        function drawRealisticEye(x, y) {
            // Sclera (White part with soft shadow)
            ctx.fillStyle = '#fdfdfd';
            ctx.beginPath(); ctx.ellipse(x, y, 28, 18, 0, 0, Math.PI*2); ctx.fill();
            let eyeShadow = ctx.createRadialGradient(x, y-10, 10, x, y, 28);
            eyeShadow.addColorStop(0, 'transparent'); eyeShadow.addColorStop(1, '#ddd');
            ctx.fillStyle = eyeShadow; ctx.fill();

            // Iris
            let irisGrad = ctx.createRadialGradient(x, y, 5, x, y, 14);
            irisGrad.addColorStop(0, shade(state.eyeColor, 30));
            irisGrad.addColorStop(0.8, state.eyeColor);
            irisGrad.addColorStop(1, shade(state.eyeColor, -40));
            ctx.fillStyle = irisGrad;
            ctx.beginPath(); ctx.arc(x, y, 14, 0, Math.PI*2); ctx.fill();

            // Pupil
            ctx.fillStyle = '#1a1a1a';
            ctx.beginPath(); ctx.arc(x, y, 7, 0, Math.PI*2); ctx.fill();

            // Catchlight (Reflection)
            ctx.fillStyle = '#ffffff';
            ctx.globalAlpha = 0.8;
            ctx.beginPath(); ctx.ellipse(x - 5, y - 5, 4, 3, Math.PI/4, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1.0;
        }

        // --- HAIR STRAND SYSTEM ---
        function drawHairStrand(x1, y1, c1x, c1y, c2x, c2y, x2, y2, color, width) {
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.bezierCurveTo(c1x, c1y, c2x, c2y, x2, y2);
            ctx.stroke();
        }

        function drawHairBack() {
            const base = state.hairColor;
            const dark = shade(base, -50);
            
            // Mass of hair behind head
            for(let i=0; i<150; i++) {
                let x = cx - 180 + Math.random()*360;
                let y = cy + Math.random()*300;
                let width = 10 + Math.random()*20;
                let color = Math.random() > 0.5 ? base : dark;
                ctx.globalAlpha = 0.8;
                drawHairStrand(cx, cy-100, x-50, cy+50, x+50, cy+150, x, y, color, width);
            }
            ctx.globalAlpha = 1.0;
        }

        function drawHairFrontRealistic() {
            const base = state.hairColor;
            const light = shade(base, 50);
            const dark = shade(base, -30);

            // Main bangs/shape
            ctx.fillStyle = base;
            ctx.beginPath();
            ctx.moveTo(cx - 140, cy - 50); // Left start
            ctx.quadraticCurveTo(cx - 150, cy - 200, cx, cy - 220); // Top arch
            ctx.quadraticCurveTo(cx + 150, cy - 200, cx + 140, cy - 50); // Right side
            // Framing face
            ctx.bezierCurveTo(cx + 100, cy + 100, cx + 80, cy + 250, cx + 100, cy + 300); // Right fall
            ctx.lineTo(cx - 100, cy + 300); // Bottom
            ctx.bezierCurveTo(cx - 80, cy + 250, cx - 100, cy + 100, cx - 140, cy - 50); // Left fall
            ctx.fill();

            // Individual Strands for texture & highlights
            // Crown/Top
            for(let i=0; i<50; i++) {
                let startX = cx - 80 + Math.random()*160;
                let endX = startX + (Math.random()-0.5)*100;
                let color = Math.random() > 0.7 ? light : (Math.random() > 0.7 ? dark : base);
                drawHairStrand(startX, cy-180, startX, cy-220, endX, cy-100, endX, cy-50, color, 3+Math.random()*4);
            }
            // Left side flow
            for(let i=0; i<40; i++) {
                 let color = Math.random() > 0.6 ? light : base;
                 drawHairStrand(cx-100, cy-100, cx-180, cy, cx-120, cy+150, cx-150+Math.random()*40, cy+280, color, 4+Math.random()*5);
            }
             // Right side flow
             for(let i=0; i<40; i++) {
                 let color = Math.random() > 0.6 ? light : base;
                 drawHairStrand(cx+100, cy-100, cx+180, cy, cx+120, cy+150, cx+150-Math.random()*40, cy+280, color, 4+Math.random()*5);
            }
        }

    </script>
</body>
</html>
